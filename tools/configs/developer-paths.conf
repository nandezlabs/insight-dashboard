#!/bin/bash
# Developer Directory Path Configuration
# Source this file in all scripts to ensure consistent path handling
# Last Updated: 2025-12-11

# Auto-detect Developer directory
if [[ -n "${DEVELOPER_DIR}" ]]; then
    # Already set by parent script
    export DEV_ROOT="${DEVELOPER_DIR}"
elif [[ -f "$HOME/Developer/tools/configs/developer-paths.conf" ]]; then
    export DEV_ROOT="$HOME/Developer"
else
    # Try to find it
    export DEV_ROOT="$(cd "$(dirname "${BASH_SOURCE[0]}")/../.." && pwd)"
fi

# Core Directories
export DEV_PROJECTS="${DEV_ROOT}/projects"
export DEV_TOOLS="${DEV_ROOT}/tools"
export DEV_DOCS="${DEV_ROOT}/docs"
export DEV_TEMPLATES="${DEV_ROOT}/templates"

# Project Subdirectories
export DEV_PROJECTS_APPS="${DEV_PROJECTS}/apps"
export DEV_PROJECTS_GAMES="${DEV_PROJECTS}/games"
export DEV_PROJECTS_LEARNING="${DEV_PROJECTS}/learning"

# Tool Subdirectories
export DEV_TOOLS_CONFIGS="${DEV_TOOLS}/configs"
export DEV_TOOLS_MAINTENANCE="${DEV_TOOLS}/maintenance"
export DEV_TOOLS_REPORTS="${DEV_TOOLS_MAINTENANCE}/reports"
export DEV_TOOLS_SECURITY="${DEV_TOOLS}/security"
export DEV_TOOLS_DEPLOYMENT="${DEV_TOOLS}/deployment"
export DEV_TOOLS_BACKUP="${DEV_TOOLS}/backup"

# Template Subdirectories
export DEV_TEMPLATES_PLANNING="${DEV_TEMPLATES}/planning"
export DEV_TEMPLATES_WORKFLOWS="${DEV_TEMPLATES}/workflows"
export DEV_TEMPLATES_GIT="${DEV_TEMPLATES}/git"
export DEV_TEMPLATES_PROJECTS="${DEV_TEMPLATES}/projects"

# Config Files (now in tools/configs/)
export DEV_GITIGNORE="${DEV_TOOLS_CONFIGS}/.gitignore"
export DEV_GITATTRIBUTES="${DEV_TOOLS_CONFIGS}/.gitattributes"
export DEV_EDITORCONFIG="${DEV_TOOLS_CONFIGS}/.editorconfig"
export DEV_PYPROJECT="${DEV_TOOLS_CONFIGS}/pyproject.toml"
export DEV_FLAKE8="${DEV_TOOLS_CONFIGS}/.flake8"

# Workspace Files
export DEV_WORKSPACE="${DEV_ROOT}/developer.code-workspace"
export DEV_README="${DEV_ROOT}/README.md"

# Helper Functions
dev_path_exists() {
    [[ -e "$1" ]] && return 0 || return 1
}

dev_ensure_dir() {
    [[ ! -d "$1" ]] && mkdir -p "$1"
}

# Verify critical paths exist
verify_dev_structure() {
    local missing=0
    for dir in "$DEV_PROJECTS" "$DEV_TOOLS" "$DEV_DOCS" "$DEV_TEMPLATES"; do
        if [[ ! -d "$dir" ]]; then
            echo "⚠️  Missing: $dir" >&2
            missing=1
        fi
    done
    return $missing
}

# Export all variables
export -f dev_path_exists
export -f dev_ensure_dir
export -f verify_dev_structure
